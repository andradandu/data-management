{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h1>Login</h1>
    <form method="POST">
        {{ form.hidden_tag() }}

        <label>Email</label>
        {{ form.email(class="input") }}

        <label>Password</label>
        {{ form.password(class="input") }}

        {{ form.submit(class="btn primary full") }}
    </form>
    <p>Need an account? <a href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
